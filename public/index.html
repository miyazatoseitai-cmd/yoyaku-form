<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ご予約フォーム</title>
  <link rel="stylesheet" href="style.css" />
  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <h1>ご予約フォーム</h1>

    <!-- Step 1: 入力フォーム -->
    <div id="step-form">
      <p class="subtitle">以下をご入力のうえ、確認ボタンを押してください。</p>

      <div class="form-group">
        <label for="menu">メニュー <span class="required">必須</span></label>
        <select id="menu" onchange="updatePriceLabel()">
          <option value="">選択してください</option>
        </select>
        <p id="price-label" class="price-label hidden"></p>
      </div>

      <div class="form-group">
        <label for="date">ご希望日 <span class="required">必須</span></label>
        <input type="date" id="date" onchange="onDateChange()" />
      </div>

      <div class="form-group">
        <label>ご希望時間 <span class="required">必須</span></label>
        <input type="hidden" id="time" />
        <div id="time-loading" class="time-loading hidden">
          <div class="spinner-small"></div>
          <span>空き状況を確認中…</span>
        </div>
        <div id="time-grid" class="time-grid"></div>
        <p id="time-selected-label" class="time-selected-label hidden"></p>
      </div>

      <div class="form-group">
        <label for="name">お名前 <span class="required">必須</span></label>
        <input type="text" id="name" placeholder="例：山田 花子" />
      </div>

      <div class="form-group">
        <label for="phone">電話番号 <span class="required">必須</span></label>
        <input type="tel" id="phone" placeholder="例：090-1234-5678" />
      </div>

      <p id="error-msg" class="error hidden"></p>
      <button class="btn" onclick="goConfirm()">内容を確認する</button>
    </div>

    <!-- Step 2: 確認画面 -->
    <div id="step-confirm" class="hidden">
      <p class="subtitle">以下の内容でよろしいですか？</p>
      <table class="confirm-table">
        <tr><th>メニュー</th><td id="c-menu"></td></tr>
        <tr><th>ご希望日</th><td id="c-date"></td></tr>
        <tr><th>ご希望時間</th><td id="c-time"></td></tr>
        <tr><th>お名前</th><td id="c-name"></td></tr>
        <tr><th>電話番号</th><td id="c-phone"></td></tr>
      </table>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="goBack()">修正する</button>
        <button class="btn" id="submit-btn" onclick="submitReservation()">予約を確定する</button>
      </div>
    </div>

    <!-- Step 3: 送信中 -->
    <div id="step-loading" class="hidden">
      <div class="loading-box">
        <div class="spinner"></div>
        <p>予約を登録しています…</p>
      </div>
    </div>
  </div>

  <script>
    let lineUserId = null;
    const LIFF_ID = '__LIFF_ID__';

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          lineUserId = profile.userId;
        } else {
          liff.login();
        }
      } catch (e) {
        console.warn('LIFF初期化エラー（LINE外からのアクセス）:', e);
      }
    }

    initLiff();

    // 日付の最小値を今日の翌日に設定
    const dateInput = document.getElementById('date');
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    dateInput.min = tomorrow.toISOString().split('T')[0];

    // メニューと時間スロットをサーバーから取得
    fetch('/api/options')
      .then(r => r.json())
      .then(({ menus, timeSlots }) => {
        const menuSel = document.getElementById('menu');
        menus.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.label;
          opt.textContent = m.label;
          opt.dataset.price = m.price;
          menuSel.appendChild(opt);
        });

        // 時間チップグリッドを生成
        const grid = document.getElementById('time-grid');
        timeSlots.forEach(t => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'time-chip';
          btn.textContent = t;
          btn.onclick = () => selectTime(t, btn);
          grid.appendChild(btn);
        });
      });

    async function onDateChange() {
      const dateEl = document.getElementById('date');
      const date = dateEl.value;
      if (!date) return;

      // 時間をリセット
      document.getElementById('time').value = '';
      document.getElementById('time-selected-label').classList.add('hidden');
      document.querySelectorAll('.time-chip').forEach(b => {
        b.classList.remove('selected', 'booked');
        b.disabled = false;
      });
      hideError();

      // ローディング表示
      document.getElementById('time-loading').classList.remove('hidden');
      document.getElementById('time-grid').classList.add('hidden');

      // 空き状況を取得
      try {
        const res = await fetch(`/api/availability?date=${date}`);
        const { isClosed, bookedSlots } = await res.json();

        if (isClosed) {
          dateEl.value = '';
          showError('この日は休業日のため予約できません。別の日をお選びください。');
          return;
        }

        // 予約済みスロットを非活性化
        document.querySelectorAll('.time-chip').forEach(btn => {
          if (bookedSlots.includes(btn.textContent)) {
            btn.classList.add('booked');
            btn.disabled = true;
          }
        });
      } catch {
        // 取得失敗時は全スロット選択可能のまま
      } finally {
        document.getElementById('time-loading').classList.add('hidden');
        document.getElementById('time-grid').classList.remove('hidden');
      }
    }

    function selectTime(t, btn) {
      document.querySelectorAll('.time-chip').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('time').value = t;
      const label = document.getElementById('time-selected-label');
      label.textContent = `選択中：${t}`;
      label.classList.remove('hidden');
    }

    function updatePriceLabel() {
      const sel = document.getElementById('menu');
      const opt = sel.options[sel.selectedIndex];
      const priceEl = document.getElementById('price-label');
      if (opt && opt.dataset.price !== undefined && sel.value !== '') {
        const price = parseInt(opt.dataset.price);
        priceEl.textContent = price === 0 ? '料金：無料' : `料金：${price.toLocaleString()}円`;
        priceEl.classList.remove('hidden');
      } else {
        priceEl.classList.add('hidden');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('error-msg').classList.add('hidden');
    }

    function goConfirm() {
      hideError();
      const menu  = document.getElementById('menu').value;
      const date  = document.getElementById('date').value;
      const time  = document.getElementById('time').value;
      const name  = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!menu || !date || !time || !name || !phone) {
        showError('全ての項目を入力してください。');
        return;
      }

      // 日付を見やすい形式に変換
      const [y, mo, d] = date.split('-');
      const dateLabel = `${parseInt(mo)}月${parseInt(d)}日`;

      document.getElementById('c-menu').textContent  = menu;
      document.getElementById('c-date').textContent  = dateLabel;
      document.getElementById('c-time').textContent  = time;
      document.getElementById('c-name').textContent  = name;
      document.getElementById('c-phone').textContent = phone;

      document.getElementById('step-form').classList.add('hidden');
      document.getElementById('step-confirm').classList.remove('hidden');
    }

    function goBack() {
      document.getElementById('step-confirm').classList.add('hidden');
      document.getElementById('step-form').classList.remove('hidden');
    }

    async function submitReservation() {
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('step-confirm').classList.add('hidden');
      document.getElementById('step-loading').classList.remove('hidden');

      // 確認画面の日付表示（例：4月17日）を YYYY-MM-DD に戻す
      const dateLabel = document.getElementById('c-date').textContent; // 例: "4月17日"
      const now = new Date();
      const match = dateLabel.match(/(\d+)月(\d+)日/);
      const isoDate = match
        ? `${now.getFullYear()}-${match[1].padStart(2,'0')}-${match[2].padStart(2,'0')}`
        : dateLabel;

      const body = {
        menu:       document.getElementById('c-menu').textContent,
        date:       isoDate,
        time:       document.getElementById('c-time').textContent,
        name:       document.getElementById('c-name').textContent,
        phone:      document.getElementById('c-phone').textContent,
        lineUserId: lineUserId,
      };

      try {
        const res = await fetch('/api/reserve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/complete.html';
        } else {
          alert(data.message || '予約に失敗しました。');
          document.getElementById('step-loading').classList.add('hidden');
          document.getElementById('step-confirm').classList.remove('hidden');
          document.getElementById('submit-btn').disabled = false;
        }
      } catch {
        alert('通信エラーが発生しました。時間をおいて再度お試しください。');
        document.getElementById('step-loading').classList.add('hidden');
        document.getElementById('step-confirm').classList.remove('hidden');
        document.getElementById('submit-btn').disabled = false;
      }
    }
  </script>
</body>
</html>
